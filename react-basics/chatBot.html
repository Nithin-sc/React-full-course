<!DOCTYPE html>
<html>

<head>
  <title>Chat Bot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin-top: 0px;
      margin-bottom: 0px;
    }
    .send-button {
      background-color: #4CAF50;
      color: white;
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
    }
    .chat-input {
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-width: 1px;
      border-radius: 10px;
      font-size: 15px;

      flex-grow: 1;
    }
    .chat-input-container {
      display: flex;
      margin-bottom: 60px;
    }
    .app-container {
      width: 600px;
      margin-left: auto;
      margin-right: auto;

      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .chat-message-user {
      display: flex;
      justify-content: end;
      margin-bottom: 10px;
    }
    .chat-message-robot {
      display: flex;
      align-items: start;
      margin-bottom: 10px;
    }
    .chat-message-text {
      max-width: 300px;
      padding: 15px 20px;
      border-radius: 10px;
      background-color: #efdddd;
      margin: 5px 5px;
    }
    .chat-message-profile {
      width: 45px;
      height: 45px;
      
    }
    .chat-messages-container {
      flex-grow: 1;
      padding: 20px;
      overflow: scroll;
      scrollbar-width: none;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">
    function ChatInput({ chatMessages, setChatMessages }) {
      const [inputText, setInputText] = React.useState('');

      const handleInputChange = (event) => {
        setInputText(event.target.value);
      };

      function addChatMessage(message, sender){
        const newChatMessages = [...chatMessages, {message, sender, id:crypto.randomUUID()}];
        setChatMessages(newChatMessages);

        const response = Chatbot.getResponse(inputText);
        console.log(response);
        setChatMessages([...newChatMessages, {message: response, sender: "robot", id:crypto.randomUUID()}]);
        setInputText('');
      } 
      return (
        <div className="chat-input-container">
          <input 
            placeholder="Send a message to ChatBot"   
            size="30" 
            value={inputText}
            onChange={handleInputChange}
            className="chat-input"
          />
          <button className="send-button" onClick={() => addChatMessage(inputText, "user")}>Send</button>
        </div>
      );
    }

    function ChatMessage({ message, sender }) {
      /*if(sender === "robot"){
        return (
      <div>  
        
        <img src={sender === "user" ? "user.png" : "robot.png"} width="50" />
        {message}
      </div>
      );
      }*/
      return (
        <div className={sender === "user" ? "chat-message-user" : "chat-message-robot"}>
          {sender === "robot" && (
            <img src="robot.png" className="chat-message-profile" />
          )}
          <p className="chat-message-text">{message}</p>
          {sender === "user" && (
            <img src="user.png" className="chat-message-profile" />
          )}
        </div>
      );
    }

    function ChatMessages({ chatMessages }) {
      const chatMessagesContainerRef = React.useRef(null);
      React.useEffect(() => {
        const chatMessagesContainer = chatMessagesContainerRef.current;
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
      }, [chatMessages]);
      return (
        <div className="chat-messages-container" ref={chatMessagesContainerRef}>
          {chatMessages.map((chatMessage,key) => {
            return (
              
              <ChatMessage key={chatMessage.id} message = {chatMessage.message}
                         sender = {chatMessage.sender} />
            );
            
          })}
        </div>
      );
    }
    function App(){
      const [chatMessages, setChatMessages] = React.useState([
        {
          message : "Hello Chatbot!",
          sender : "user",
          id:"t1"
        },
        {
          message : "Hello! How can I help you?",
          sender : "robot",
          id:"t2"
        }
      ]);
      // const [chatMessages, setChatMessages] = array;
      // const chatMessages = array[0];
      // const setChatMessages = array[1];
      return (
        <div className="app-container" >
          <h1>Chat Bot</h1>
          
          <ChatMessages chatMessages={chatMessages} />
          <ChatInput 
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
        </div>
      );
    }
   
    ReactDOM.render(<App />, document.querySelector(".js-container"));
  </script>
</body>

</html>
